<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>冷蔵庫チェッカー</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <h1>🥬 冷蔵庫チェッカー</h1>
  <p id="summary">読み込み中...</p>
</header>

<main>

  <!-- 状態サマリー -->
  <div class="summary-box">
    <div>🔥 危険: <span id="dangerCount">0</span></div>
    <div>⚠️ 注意: <span id="warningCount">0</span></div>
    <div>🟢 安全: <span id="safeCount">0</span></div>
  </div>

  <!-- フィルター -->
  <div class="filter-area">
    <button onclick="setFilter('all')">すべて</button>
    <button onclick="setFilter('warning')">期限近い</button>
    <button onclick="setFilter('completed')">使用済み</button>
  </div>

  <!-- 入力 -->
  <div class="form-area">
    <input type="text" id="name" placeholder="食材名">
    <input type="number" id="amount" placeholder="数量">

    <select id="unit">
      <option value="個">個</option>
      <option value="本">本</option>
      <option value="g">g</option>
      <option value="ml">ml</option>
    </select>

    <label for="deadline">消費期限</label>
    <input type="date" id="deadline">
    <button id="addBtn">追加</button>
  </div>

  <div id="foodList"></div>

</main>

<script type="module" src="app.js"></script>

</body>
</html>
